<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BETMAN — Set Password</title>
  <link rel="stylesheet" href="styles.css?v=20260313-1535" />
</head>
<body>
  <div class="app" style="max-width:760px">
    <header class="topbar">
      <div class="brand" style="display:flex;align-items:center;gap:10px">
        <img src="assets/logo.png" alt="Betman" class="brand-logo" />
        <span>BETMAN — Set Password</span>
      </div>
    </header>
    <section class="section">
      <h3>Create your BETMAN password</h3>
      <div class="ai-chat-input-row" style="margin-bottom:8px"><input id="pw1" type="password" placeholder="New password (min 8 chars)" /></div>
      <div class="ai-chat-input-row" style="margin-bottom:8px"><input id="pw2" type="password" placeholder="Confirm password" /></div>
      <button id="setPwBtn" class="btn">Set Password</button>
      <div id="msg" class="sub" style="margin-top:8px"></div>
    </section>
  </div>

  <script>
    const cleanBase = `${window.location.protocol}//${window.location.host}`;
    const token = new URLSearchParams(window.location.search).get('token') || '';

    document.getElementById('setPwBtn').addEventListener('click', async ()=>{
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');
      if (!token) { msg.textContent = 'Invalid setup link.'; return; }
      if (!pw1 || pw1.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; return; }
      if (pw1 !== pw2) { msg.textContent = 'Passwords do not match.'; return; }
      msg.textContent = 'Setting password…';
      try {
        const r = await fetch(new URL('/api/set-password', cleanBase).toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw1 })
        });
        const out = await r.json().catch(()=>({}));
        if (!r.ok || !out?.ok) { msg.textContent = `Failed: ${out?.error || r.status}`; return; }
        msg.textContent = 'Password set successfully. Redirecting to login…';
        setTimeout(()=>{ window.location.href = '/login?setup=ok'; }, 800);
      } catch {
        msg.textContent = 'Request failed. Please retry.';
      }
    });
  </script>
</body>
</html>
