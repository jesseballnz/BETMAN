<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BETMAN — Maintenance</title>
  <style>
    :root {
      --bg:#081018;
      --panel:#0f1b26;
      --border:#1e3448;
      --text:#e8eef5;
      --muted:#94a7ba;
      --accent:#6dff9b;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top, #102030 0%, var(--bg) 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .card{width:min(720px,100%);background:rgba(15,27,38,.94);border:1px solid var(--border);border-radius:28px;padding:40px 32px;box-shadow:0 20px 80px rgba(0,0,0,.35);text-align:center}
    img{width:min(280px,60vw);height:auto;margin:0 auto 20px;display:block}
    h1{margin:0 0 12px;font-size:clamp(28px,5vw,42px);letter-spacing:.04em}
    p{margin:0 auto 12px;max-width:560px;font-size:16px;line-height:1.6;color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:rgba(109,255,155,.12);border:1px solid rgba(109,255,155,.28);color:var(--accent);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:12px;margin-bottom:18px}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">BETMAN Maintenance</div>
    <img src="assets/logo.png" alt="BETMAN" />
    <h1>Upgrading the engine.</h1>
    <p>BETMAN is temporarily in maintenance while we finish a live product pass across mobile, alerts, and tracking.</p>
    <p>Please check back shortly.</p>
  </main>
</body>
</html>
